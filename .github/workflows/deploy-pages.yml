name: Déployer Publia sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
      - name: Installer pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile
      - name: Construire Publia
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_APP_URL: https://patrickeudess.github.io/Publia
        run: pnpm run build:github
      - name: Préparer les routes React
        run: cp dist/index.html dist/404.html
      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Charger l’artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4